name: RTPL QA Summarizer

on:
  # Runs every 30 minutes, 24/7 — no desktop required.
  schedule:
    - cron: "*/30 * * * *"
  # Allows a manual run from the GitHub Actions UI (useful for testing).
  workflow_dispatch:

jobs:
  summarize:
    name: Summarize Ready-for-QA tickets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run QA Agent
        env:
          # ── Jira ─────────────────────────────────────────────────────────
          JIRA_CLOUD_ID:     "8cfe2d30-ec89-4307-aa29-844b6825cf97"
          JIRA_EMAIL:        ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:    ${{ secrets.JIRA_API_TOKEN }}

          # ── Slack ─────────────────────────────────────────────────────────
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  "C0B1V5DH4AY"   # #tickets_summerization

          # ── Anthropic ─────────────────────────────────────────────────────
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # ── Testmo ────────────────────────────────────────────────────────
          TESTMO_URL:        ${{ secrets.TESTMO_URL }}
          TESTMO_API_TOKEN:  ${{ secrets.TESTMO_API_TOKEN }}
          TESTMO_SUITE_ID:   ${{ secrets.TESTMO_SUITE_ID }}

        run: python scripts/qa_agent.py
