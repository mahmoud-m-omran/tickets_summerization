name: Create Testmo Test Cases

on:
  push:
    paths:
      - 'triggers/*.json'
  workflow_dispatch:

jobs:
  create-testmo-cases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Testmo test cases
        env:
          TESTMO_API_TOKEN: ${{ secrets.TESTMO_API_TOKEN }}
        run: python3 scripts/create_testmo_cases.py

      - name: Commit results
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git add completed/ triggers/
          git status
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: process testmo triggers [skip ci]"
            git push origin HEAD:main
          fi
